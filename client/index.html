<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPTArts</title>
    <style>
      @media (max-width: 992px) {
        .mobile-menu-btn { display: inline-flex !important; }
        .ant-layout-content { padding: 12px !important; }
        .ant-card-cover > div { aspect-ratio: 3/2 !important; }
        .hide-on-mobile { display: none !important; }
        .browse-header { flex-wrap: wrap; gap: 8px !important; }
        .browse-header .ant-segmented { font-size: 12px; }
        .login-card { padding: 32px 20px 24px !important; }
        .ant-table { font-size: 12px; }
        .ant-table-thead > tr > th,
        .ant-table-tbody > tr > td { padding: 8px 6px !important; }
      }
      @media (max-width: 576px) {
        .ant-pagination { font-size: 12px; }
        .ant-pagination-item { min-width: 28px; height: 28px; line-height: 28px; }
        .ant-modal { max-width: calc(100vw - 32px) !important; }
        .ant-modal-body { padding: 16px !important; }
        .ant-modal-body img { max-height: 300px !important; }
        .header-username { display: none; }
        .search-bar { max-width: 160px !important; }
      }
      .responsive-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }
      @media (min-width: 600px) {
        .responsive-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      }
      @media (min-width: 992px) {
        .responsive-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
